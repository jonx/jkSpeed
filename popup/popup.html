<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-row">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <h1>jkSpeed</h1>
      </div>
      <div class="header-right">
        <a class="byline" href="https://jkn.me/chrome" target="_blank">by jkn.me/chrome</a>
        <div class="header-shortcuts">
          <button class="shortcut-key" data-action="speedDown" title="Slow down"></button>
          <span class="shortcut-sep">slow / fast</span>
          <button class="shortcut-key" data-action="speedUp" title="Speed up"></button>
        </div>
      </div>
    </div>
  </header>
  <main id="video-list">
    <div class="loading">
      <div class="spinner"></div>
      Scanning for videos...
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
